function formatChinese(num) {
    if (num >= 100000000) {
        const yi = Math.floor(num / 100000000);
        const wan = Math.round((num % 100000000) / 10000);
        return wan > 0 ? `${yi}億${wan.toLocaleString()}萬` : `${yi}億`;
    } else if (num >= 10000000) {
        const qianwan = Math.floor(num / 10000000);
        const wan = Math.round((num % 10000000) / 10000);
        return wan > 0 ? `${qianwan}千${wan}萬` : `${qianwan}千萬`;
    } else if (num >= 10000) {
        const wan = Math.floor(num / 10000);
        const qian = Math.round((num % 10000) / 1000);
        return qian > 0 ? `${wan}萬${qian}千` : `${wan}萬`;
    } else if (num >= 1000) {
        const qian = Math.floor(num / 1000);
        const bai = Math.round((num % 1000) / 100);
        return bai > 0 ? `${qian}千${bai}百` : `${qian}千`;
    }
    return num.toLocaleString();
}

        const avgPrice  = totalAmt / totalQty;
        const prices    = data.map(([,q,a])=>a/q);
        const maxP      = Math.max(...prices);
        const minP      = Math.min(...prices);
        const volatility = prices.length > 1 ? (maxP - minP) / avgPrice * 100 : 0;
        const months    = data.length;
        return { code, name: name.split(' ').slice(-1)[0] || name, fullName: name, totalQty, totalAmt, avgPrice, volatility, months };
    });

    // ── Monthly totals (all products combined) ──
    const monthlyAmt = new Array(12).fill(0);

    for (const [, [, data]] of Object.entries(DATA)) {

            monthlyAmt[m-1] += a;

          番茄L 最典型：1月產量 19,213 kg，到 11 月剩 <strong>440 kg</strong>，幾乎斷貨。
          日本青瓜 10月從高峰掉到 1,427 kg，11 月剩 <strong>406 kg</strong>。<br><br>
          淡季如果沒有足夠品項補位，員工薪資、土地成本照樣支出，利潤就會被侵蝕。
        </div>
      </div>

      <!-- Problem 3: Zombie products -->
      <div class="diag-card warn">
        <div class="diag-card-header">
          <span class="diag-card-icon">🪦</span>
          <div>
            <div class="diag-card-title">問題三：有品項幾乎在浪費資源</div>
            <span class="diag-card-label label-warn">⚠️ 需要關注</span>
          </div>
        </div>
        <div class="diag-body">
          以下品項銷售月份極少、金額極低，占用土地與人力卻幾乎沒有貢獻：
          ${weakHtml}
          <div class="diag-highlight">
            紅珊瑚生菜 1月有 877 kg，2月突然剩 <strong>5 kg</strong>，4月只有 <strong>3 kg</strong>。
            這不像正常收成，疑似客戶流失或市場無人要。
          </div>
          這些品項占用的土地若改種主力商品，理論上可直接增加收入。
        </div>
      </div>

      <!-- Problem 4: Price volatility -->
      <div class="diag-card">
        <div class="diag-card-header">
          <span class="diag-card-icon">🎢</span>
          <div>
            <div class="diag-card-title">問題四：單價波動異常，定價管理有問題</div>
            <span class="diag-card-label label-danger">🚨 嚴重警示</span>
          </div>
        </div>
        <div class="diag-body">
          以下品項單價波動幅度遠超正常市場行情：
          <table class="diag-table" style="margin-top:10px">
            <thead><tr><th>品項</th><th>最低單價</th><th>最高單價</th><th>波動幅度</th></tr></thead>
            <tbody>${volHtml}</tbody>
          </table>
          <div class="diag-highlight red">
            芹菜最低 4,289、最高 38,942 LAK/kg，波動幅度超過 <strong>800%</strong>，屬於嚴重異常
          </div>
          可能原因：不同客戶售價不統一、淡季定價失控、或有品項是在虧本出清。
        </div>
      </div>

      <!-- Problem 5: Mysterious disappearances -->
      <div class="diag-card info">
        <div class="diag-card-header">
          <span class="diag-card-icon">❓</span>
          <div>
            <div class="diag-card-title">問題五：部分品項中途消失，原因不明</div>
            <span class="diag-card-label label-info">📌 需要追查</span>
          </div>
        </div>
        <div class="diag-body">
          <strong>冰山生菜（V0009）</strong>：1–6 月正常銷售，<strong>7–11 月完全空白</strong>，12 月才突然出現 2,791 kg。
          <div class="diag-highlight">這不像季節性停產，更像是中途遭遇問題（客戶跑掉？種植失敗？）</div>
          <strong>菜心（V0016）</strong>：6、7、8 月連續三個月無銷售，9 月恢復。<br><br>
          這類「消失又出現」的品項，如果是可控因素導致，調整後可以補回這段的損失收入。
        </div>
      </div>

      <!-- Problem 6: Tomato fragmentation -->
      <div class="diag-card info">
        <div class="diag-card-header">
          <span class="diag-card-icon">🍅</span>
          <div>
            <div class="diag-card-title">問題六：番茄規格太分散，可能自己搶市場</div>
            <span class="diag-card-label label-info">📌 值得評估</span>
          </div>
        </div>
        <div class="diag-body">
          同時販賣 <strong>番茄 XL、L、M、S</strong> 四個規格，管理成本高，且：
          <div class="diag-highlight">
            番茄S 平均單價 約 17,000 LAK/kg，番茄M 平均約 19,000 LAK/kg，
            規格越小單價越低，但 S 的產量不低，是否值得繼續？
          </div>
          番茄L 下半年幾乎斷貨，而番茄M 下半年單價反而衝到最高（10月 22,757 LAK）。
          建議評估是否聚焦 <strong>M + L 兩個規格</strong>，把 XL 和 S 的資源集中過來。
        </div>
      </div>

    </div>

    <!-- Recommendations -->
    <div class="diag-reco" style="margin-top:20px">
      <h3>💡 老闆行動建議（優先順序）</h3>
      <div class="diag-reco-list">
        <div class="diag-reco-item">
          <div class="diag-reco-num">1</div>
          <div class="diag-reco-text"><strong>立即砍掉或縮減</strong>西洋菜、南瓜等全年金額低於 500 萬 LAK 的品項，把土地資源移到前 5 名主力商品，直接提升整體收入。</div>
        </div>
        <div class="diag-reco-item">
          <div class="diag-reco-num">2</div>
          <div class="diag-reco-text"><strong>規劃淡季補強品項</strong>：找出 7–9 月還能維持銷售的品項（目前這段缺口最大），優先增加這些品項的種植量，平衡全年現金流。</div>
        </div>
        <div class="diag-reco-item">
          <div class="diag-reco-num">3</div>
          <div class="diag-reco-text"><strong>追查冰山生菜與紅珊瑚生菜</strong>中途停賣的原因，如果是可控因素，恢復後每年可多回收這段的損失。</div>
        </div>
        <div class="diag-reco-item">
          <div class="diag-reco-num">4</div>
          <div class="diag-reco-text"><strong>建立統一定價制度</strong>，特別是芹菜、菜心這類波動異常的品項，避免旺季高價/淡季虧本的惡性循環。</div>
        </div>
        <div class="diag-reco-item">
          <div class="diag-reco-num">5</div>
          <div class="diag-reco-text"><strong>評估番茄規格整併</strong>，建議聚焦番茄 M + L，XL 和 S 的資源可以轉移到生菜類（青珊瑚、青牛油）等全年單價上升趨勢的品項。</div>
        </div>
      </div>
    </div>`;
}

function renderSummary() {
    const rows = Object.entries(DATA).map(([code, [name, data]]) => {
        const totalQty = data.reduce((s, [,q]) => s + q, 0);
        const totalAmt = data.reduce((s, [,,a]) => s + a, 0);
        const avgPrice = totalAmt / totalQty;
        const months = data.length;
        const anchorId = 'prod-' + code.replace('.', '-');
        return { code, name, totalQty, totalAmt, avgPrice, months, anchorId };
    });

    const grandQty = rows.reduce((s, r) => s + r.totalQty, 0);
    const grandAmt = rows.reduce((s, r) => s + r.totalAmt, 0);

    // Desktop table rows
    const rowsHtml = rows.map(r => `
        <tr>
            <td><span class="s-code">${r.code}</span></td>
            <td><a class="summary-anchor" href="#${r.anchorId}">${r.name}</a></td>
            <td class="s-months">${r.months} 個月</td>
            <td class="s-qty">${r.totalQty.toLocaleString()} kg</td>
            <td class="s-amount">${formatChinese(Math.round(r.totalAmt))}</td>
            <td class="s-amount" style="color:#c0392b">${formatChinese(Math.round(r.totalAmt*RATE))}</td>
            <td class="s-avgprice">${r.avgPrice.toFixed(0)}</td>
            <td class="s-avgprice">${(r.avgPrice*RATE).toFixed(2)}</td>
        </tr>`).join('');

    // Mobile cards
    const cardsHtml = rows.map(r => `
        <div class="summary-card">
            <div class="summary-card-header">
                <span class="summary-card-code">${r.code}</span>
                <span class="summary-card-months">📅 ${r.months} 個月</span>
            </div>
            <div class="summary-card-name"><a href="#${r.anchorId}">${r.name}</a></div>
            <div class="summary-card-stats">
                <div class="summary-card-stat">
                    <div class="summary-card-stat-label">總產量</div>
                    <div class="summary-card-stat-value s-qty">${r.totalQty.toLocaleString()} kg</div>
                </div>
                <div class="summary-card-stat">
                    <div class="summary-card-stat-label">總金額 (LAK)</div>
                    <div class="summary-card-stat-value s-amount">${formatChinese(Math.round(r.totalAmt))}</div>
                </div>
                <div class="summary-card-stat">
                    <div class="summary-card-stat-label">總金額 (TWD)</div>
                    <div class="summary-card-stat-value" style="color:#c0392b;font-weight:700">${formatChinese(Math.round(r.totalAmt*RATE))}</div>
                </div>
                <div class="summary-card-stat">
                    <div class="summary-card-stat-label">平均單價 (LAK)</div>
                    <div class="summary-card-stat-value s-avgprice">${r.avgPrice.toFixed(0)}</div>
                </div>
            </div>
        </div>`).join('');

    document.getElementById('summary').innerHTML = `
        <h2>📋 蔬菜銷售摘要總覽</h2>

        <!-- Desktop table -->
        <table class="summary-table">
            <thead><tr>
                <th>代碼</th><th>品名</th><th>銷售月數</th>
                <th>總產量 (kg)</th><th>總金額 (LAK)</th><th>總金額 (TWD)</th>
                <th>平均單價 (LAK)</th><th>平均單價 (TWD)</th>
            </tr></thead>
            <tbody>
                ${rowsHtml}
                <tr class="total-row">
                    <td colspan="3">🔢 合計</td>
                    <td class="s-qty">${grandQty.toLocaleString()} kg</td>
                    <td class="s-amount">${formatChinese(Math.round(grandAmt))}</td>
                    <td class="s-amount" style="color:#c0392b">${formatChinese(Math.round(grandAmt*RATE))}</td>
                    <td colspan="2">—</td>
                </tr>
            </tbody>
        </table>

        <!-- Mobile cards -->
        <div class="summary-cards">
            ${cardsHtml}
            <div class="summary-total-card">
                <h3>🔢 全部合計</h3>
                <div class="summary-card-stats">
                    <div class="summary-card-stat">
                        <div class="summary-card-stat-label">總產量</div>
                        <div class="summary-card-stat-value">${grandQty.toLocaleString()} kg</div>
                    </div>
                    <div class="summary-card-stat">
                        <div class="summary-card-stat-label">總金額 (LAK)</div>
                        <div class="summary-card-stat-value">${formatChinese(Math.round(grandAmt))}</div>
                    </div>
                    <div class="summary-card-stat">
                        <div class="summary-card-stat-label">總金額 (TWD)</div>
                        <div class="summary-card-stat-value">${formatChinese(Math.round(grandAmt*RATE))}</div>
                    </div>
                </div>
            </div>
        </div>`;
}

function render() {
    const html = Object.entries(DATA).map(([code, [name, data]], idx) => {
        const prices = new Array(12).fill(null);
        const quantities = new Array(12).fill(null);
        const validPrices = [];
        
        for (const [m, q, a] of data) {
            prices[m-1] = a/q;
            quantities[m-1] = q;
            validPrices.push(a/q);
        }
        
        if (!validPrices.length) return '';
        
        const maxP = Math.max(...validPrices);
        const minP = Math.min(...validPrices);
        const avgP = validPrices.reduce((a,b) => a+b) / validPrices.length;
        
        let priceHtml = '';
        let twdHtml = '';
        let qtyHtml = '';
        let amountHtml = '';
        const amounts = new Array(12).fill(null);
        
        for (const [m, q, a] of data) {
            amounts[m-1] = a;
        }
        
        for (let m = 0; m < 12; m++) {
            if (prices[m] !== null) {
                const cls = Math.abs(prices[m] - maxP) < 0.01 ? 'highest-price' : Math.abs(prices[m] - minP) < 0.01 ? 'lowest-price' : '';
                priceHtml += `<td class="price-lak ${cls}">${prices[m].toFixed(0)}</td>`;
                twdHtml += `<td class="price-twd ${cls}">${(prices[m]*RATE).toFixed(2)}</td>`;
            } else {
                priceHtml += '<td class="price-lak">-</td>';
                twdHtml += '<td class="price-twd">-</td>';
            }
            qtyHtml += quantities[m] ? `<td class="quantity">${quantities[m].toLocaleString()}</td>` : '<td class="quantity">-</td>';
            amountHtml += amounts[m] !== null ? `<td class="amount-lak">${(amounts[m]/1000000).toFixed(2)}M</td>` : '<td class="amount-lak">-</td>';
        }
        
        const anchorId = 'prod-' + code.replace('.', '-');

        // Compute badge
        const allAmts = Object.values(DATA).map(([,d])=>d.reduce((s,[,,a])=>s+a,0));
        const thisAmt = data.reduce((s,[,,a])=>s+a,0);
        const sortedAmts = [...allAmts].sort((a,b)=>b-a);
        const rank = sortedAmts.indexOf(thisAmt);
        const volatility = validPrices.length > 1 ? (maxP - minP) / avgP * 100 : 0;
        let badge = '';
        if (rank < 3) badge = '<span class="product-badge badge-star">⭐ 明星商品</span>';
        else if (rank >= sortedAmts.length - 3) badge = '<span class="product-badge badge-weak">📉 待檢討</span>';
        if (volatility > 80) badge += '<span class="product-badge badge-volatile">⚡ 價格波動大</span>';

        return `<div class="product-section" id="${anchorId}">
            <div class="product-title"><div class="product-code">${code}</div><div class="product-name">${name}${badge}</div></div>
            <div class="stats-grid">
                <div class="stat-card highest"><div class="stat-label">🔴 最高單價</div><div class="stat-value">${maxP.toFixed(0)}</div><div style="font-size: 0.85em; color: #7f8c8d;">${(maxP*RATE).toFixed(2)} TWD</div></div>
                <div class="stat-card lowest"><div class="stat-label">🟢 最低單價</div><div class="stat-value">${minP.toFixed(0)}</div><div style="font-size: 0.85em; color: #7f8c8d;">${(minP*RATE).toFixed(2)} TWD</div></div>
                <div class="stat-card average"><div class="stat-label">📊 平均單價</div><div class="stat-value">${avgP.toFixed(0)}</div><div style="font-size: 0.85em; color: #7f8c8d;">${(avgP*RATE).toFixed(2)} TWD</div></div>
            </div>
            <div class="data-chart-layout">
                <div class="table-wrapper">
                    <table><thead><tr><th>月份</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th></tr></thead><tbody>
                        <tr><td>單價(LAK)</td>${priceHtml}</tr>
                        <tr><td>單價(TWD)</td>${twdHtml}</tr>
                        <tr><td>產量(kg)</td>${qtyHtml}</tr>
                        <tr><td>總金額(LAK)</td>${amountHtml}</tr>
                    </tbody></table>
                </div>
                <div class="chart-wrapper"><canvas id="c${idx+1}"></canvas></div>
            </div>
        </div>`;
    }).join('');
    
    document.getElementById('content').innerHTML = html;
    renderGrandTotal();
    renderAnalytics();
    renderDiagnosis();
    renderSummary();
    setTimeout(initCharts, 100);
}

window.addEventListener('load', render);
</script>
